
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        .signature-table {
            font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            border-collapse: collapse;
            max-width: 500px;
        }
        .logo-cell {
            vertical-align: middle;
            padding-right: 20px;
        }
        .logo-text {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 28px;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: -1px;
        }
        .logo-am { color: #C9A84C; }
        .logo-otive { color: #0A1628; }
        .info-cell {
            vertical-align: middle;
            border-left: 3px solid #C9A84C;
            padding-left: 15px;
        }
        .name {
            font-size: 16px;
            font-weight: 600;
            color: #0A1628;
            margin: 0 0 2px 0;
        }
        .title {
            font-size: 14px;
            color: #6B7280;
            margin: 0 0 8px 0;
        }
        .tagline {
            font-size: 12px;
            color: #C9A84C;
            font-weight: 500;
            margin: 0 0 8px 0;
            letter-spacing: 0.5px;
        }
        .contact {
            font-size: 12px;
            color: #6B7280;
            margin: 0;
        }
        .contact a {
            color: #0A1628;
            text-decoration: none;
        }
        .contact a:hover {
            color: #C9A84C;
        }
    </style>
</head>
<body>
    <table class="signature-table">
        <tr>
            <td class="logo-cell">
                <a href="https://amotive.com" style="text-decoration: none;" class="logo-text">
                    <span class="logo-am">am</span><span class="logo-otive">otive</span>
                </a>
            </td>
            <td class="info-cell">
                <p class="name">A</p>
                <p class="title">Founder</p>
                <p class="tagline">Your growth. Engineered.</p>
                <p class="contact">
                    <a href="mailto:hello@amotive.com">hello@amotive.com</a> • 
                    <a href="https://amotive.com">amotive.com</a><br>
                    Pacific Northwest Digital Agency
                </p>
            </td>
        </tr>
    </table>
<script src="/js/consent.js" defer></script>
<script src="/js/fingerprint.js" defer></script>
</body>
</html>
